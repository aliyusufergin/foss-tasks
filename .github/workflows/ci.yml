name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  auth:
    name: auth service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  app:
    name: app (seams + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # node:sqlite (data-layer harness) is available unflagged from Node 24.
          node-version: 24
      - run: npm ci --legacy-peer-deps
      # Node-safe domain + data-layer seams.
      - run: npm run typecheck
      - run: npm test
      # Full React Native / Expo typecheck.
      - run: npm run typecheck:app
