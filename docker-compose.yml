# foss-tasks self-hosted backend stack.
#
# One `docker-compose up` brings up:
#   * postgres         — source of truth (wal_level=logical, powersync publication)
#   * powersync-bucket — separate Postgres for PowerSync bucket storage (ADR-0007)
#   * powersync        — PowerSync Service (Postgres bucket, membership sync rules)
#   * auth             — email+password → PowerSync-compatible JWTs
#
# Copy .env.example to .env and fill it in first (see docs/product/self-hosting.md).

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Consumed by init/02-powersync.sh to create the replication role.
      POWERSYNC_REPLICATION_PASSWORD: ${POWERSYNC_REPLICATION_PASSWORD}
    # wal_level=logical is required for PowerSync replication and can only be set
    # at server start (not from an init script).
    command: ["postgres", "-c", "wal_level=logical"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  powersync-bucket:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${BUCKET_POSTGRES_USER}
      POSTGRES_PASSWORD: ${BUCKET_POSTGRES_PASSWORD}
      POSTGRES_DB: ${BUCKET_POSTGRES_DB}
    volumes:
      - powersync_bucket_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${BUCKET_POSTGRES_USER} -d ${BUCKET_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  powersync:
    image: journeyapps/powersync-service:latest
    restart: unless-stopped
    command: ["start", "-r", "unified"]
    depends_on:
      postgres:
        condition: service_healthy
      powersync-bucket:
        condition: service_healthy
    volumes:
      - ./infra/powersync:/config:ro
    environment:
      POWERSYNC_CONFIG_PATH: /config/service.yaml
      PS_PORT: ${PS_PORT}
      PS_DATA_SOURCE_URI: postgresql://powersync_replication:${POWERSYNC_REPLICATION_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PS_STORAGE_SOURCE_URI: postgresql://${BUCKET_POSTGRES_USER}:${BUCKET_POSTGRES_PASSWORD}@powersync-bucket:5432/${BUCKET_POSTGRES_DB}
      PS_JWKS_URL: http://auth:${AUTH_PORT}/api/auth/keys
      PS_ADMIN_API_TOKEN: ${PS_ADMIN_API_TOKEN}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:${PS_PORT}/probes/liveness').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 1s
      retries: 15
    ports:
      - "${PS_PORT}:${PS_PORT}"

  auth:
    build: ./services/auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AUTH_PORT: ${AUTH_PORT}
      AUTH_HOST: 0.0.0.0
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE}
      AUTH_JWT_KID: ${AUTH_JWT_KID}
      AUTH_JWT_TTL_SECONDS: ${AUTH_JWT_TTL_SECONDS}
      AUTH_SESSION_MAX_AGE_SECONDS: ${AUTH_SESSION_MAX_AGE_SECONDS}
      AUTH_JWT_PRIVATE_KEY: ${AUTH_JWT_PRIVATE_KEY}
      AUTH_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"

volumes:
  postgres_data:
  powersync_bucket_data:
